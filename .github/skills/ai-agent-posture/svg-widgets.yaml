# SVG Dashboard Widget Manifest — AI Agent Security Posture Report
#
# This file defines the layout and data mapping for generating an SVG dashboard
# from a completed AI Agent Security Posture report. It is consumed by the shared
# SVG rendering skill at .github/skills/svg-dashboard/SKILL.md
#
# Usage:  After generating an AI agent posture report, ask:
#           "Generate an SVG dashboard from the report"
#         Copilot will read this manifest + the report data + the skill,
#         then produce a single SVG file in reports/ai-agent-posture/.
#
# Customization:  Tweak rows, reorder widgets, add/remove items, change colors.
#                 The renderer adapts to whatever is defined here.

# ─── Canvas ──────────────────────────────────────────────────────────────────
canvas:
  width: 1400
  height: 1100          # 5 rows, 12 widgets — within output token limits
  background: "#0d1117"
  padding: 30
  row_gap: 20
  col_gap: 20
  font_family: "Segoe UI, Roboto, sans-serif"

# ─── Color Palette ───────────────────────────────────────────────────────────
palette:
  primary: "#409AE1"      # blue   — KPI highlights, primary data
  secondary: "#b4a0ff"    # purple — secondary charts
  accent: "#FFC83D"       # yellow — warnings, near-threshold
  danger: "#EF6950"       # red    — critical findings, flagged entities
  success: "#40C5AF"      # green  — stable, healthy metrics
  muted: "#b2b2b2"        # gray   — labels, axis text
  card_bg: "#161b22"      # dark card background
  card_border: "#30363d"  # subtle border
  text_primary: "#e6edf3"
  text_secondary: "#b2b2b2"

# ─── Score Rating Colors ────────────────────────────────────────────────────
# Bands MUST match the skill's Interpretation Scale (SKILL.md):
score_rating_colors:
  healthy: "#40C5AF"        # green  — 0–20  (✅ Healthy)
  elevated: "#FFC83D"       # yellow — 21–45 (🟡 Elevated)
  concerning: "#FF8C00"     # orange — 46–70 (🟠 Concerning)
  critical: "#EF6950"       # red    — 71–100 (🔴 Critical)

# ─── Dimension Colors (Agent Security Score — 5 dimensions) ─────────────────
# Labels match the Agent Security Score Card in the report template exactly.
dimension_colors:
  broad_access: "#40C5AF"         # green  — Broad Access (allowForAllUsers)
  xpia_email: "#EF6950"           # red    — XPIA Email Risk
  tool_endpoint_exposure: "#409AE1" # blue — Tool & Endpoint Exposure (MCP + Q9 endpoints)
  data_source_risk: "#b4a0ff"     # purple — Data Source Risk (declared knowledge sources)
  credential_hygiene: "#FFC83D"   # yellow — Credential Hygiene

# ─── Row Definitions ─────────────────────────────────────────────────────────
# TOKEN-BUDGET LAYOUT: 5 rows, 12 widgets, ~1100px height
# Designed for AI agent posture reports with score card, dimension breakdown,
# XPIA risk table, tool inventory, and recommendations.

rows:

  # ── ROW 1: Title Bar ────────────────────────────────────────────────────────
  - id: title-bar
    height: 70
    widgets:
      - type: title-banner
        fields:
          title: "AI Agent Security Posture Dashboard"
          subtitle_fields:
            - platform                # multi-platform → "Multiple (N platforms)"
            - analysis_period         # e.g. "2026-03-12 → 2026-03-19 (7 days)"
            - generation_date         # e.g. "2026-03-19"
            - dcm_coverage            # Deep-Manifest (DCM) coverage %, e.g. "DCM 55%"
        style:
          title_align: center
          title_size: 26
          subtitle_size: 13
          accent_color: palette.primary

  # ── ROW 2: Agent Security Score + KPI Cards ────────────────────────────────
  - id: score-and-kpis
    height: 150
    widgets:
      - type: score-card
        title: "Agent Security Score"
        field: agent_security_score         # e.g. 64 (0–100, higher = worse)
        width_pct: 25
        ranges:
          - { min: 0,  max: 20, color: score_rating_colors.healthy,    label: "Healthy" }
          - { min: 21, max: 45, color: score_rating_colors.elevated,   label: "Elevated" }
          - { min: 46, max: 70, color: score_rating_colors.concerning, label: "Concerning" }
          - { min: 71, max: 100, color: score_rating_colors.critical,  label: "Critical" }
        show_rating_label: true

      - type: kpi-card
        label: "Total Agents"
        field: total_agents                 # Key Metrics → Total Agents (non-deleted)
        unit: "agents"
        icon: "bot"

      - type: kpi-card
        label: "Broad Access"
        field: broad_access_count           # Key Metrics → Broadly-Accessible Agents (allowForAllUsers)
        unit: "agents"
        icon: "globe"
        highlight_color: palette.danger

      - type: kpi-card
        label: "XPIA Risk"
        field: xpia_risk_count              # Key Metrics → Email-Capable Agents (XPIA Risk)
        unit: "agents"
        icon: "alert-triangle"
        highlight_color: palette.danger

      - type: kpi-card
        label: "MCP Servers"
        field: mcp_agent_count              # Key Metrics → Agents with MCP Servers
        unit: "agents"
        icon: "plug"
        highlight_color: palette.accent

      - type: kpi-card
        label: "Broad + Sensitive"
        field: privilege_broad_sensitive_count   # Capability Privilege Index → broadly-accessible agents w/ sensitive (write/send) op
        unit: "agents"
        icon: "key"
        highlight_color: palette.danger

  # ── ROW 3: Score Dimensions + Access Control ───────────────────────────────
  - id: dimensions-and-access
    height: 280
    widgets:
      - type: horizontal-bar-chart
        title: "Security Score Dimensions"
        field: score_dimensions             # array of {dimension, score, max}
        width_pct: 50
        bar_height: 32
        max_items: 5
        value_suffix: "/20"
        label_field: "dimension"
        value_field: "score"
        max_value: 20
        bar_color_map:
          "Broad Access": dimension_colors.broad_access
          "XPIA Email Risk": dimension_colors.xpia_email
          "Tool & Endpoint Exposure": dimension_colors.tool_endpoint_exposure
          "Data Source Risk": dimension_colors.data_source_risk
          "Credential Hygiene": dimension_colors.credential_hygiene

      - type: table-widget
        title: "XPIA Email Risk Agents"
        field: xpia_risk_agents             # array of {agent, platform, email_op, access}
        width_pct: 50
        columns:
          - { header: "Agent",    field: "agent",    width: 35 }
          - { header: "Platform", field: "platform", width: 25 }
          - { header: "Email Op", field: "email_op", width: 22 }
          - { header: "Access",   field: "access",   width: 18, badge: true }
        max_items: 5
        badge_colors:
          "All users": palette.danger
          "Yes": palette.danger
          "Scoped": palette.success
          "No": palette.success

  # ── ROW 4: Tool Inventory + Knowledge Sources ─────────────────────────────
  - id: tools-and-knowledge
    height: 280
    widgets:
      - type: horizontal-bar-chart
        title: "Tool Distribution"
        field: tool_distribution            # array of {tool, count}
        width_pct: 45
        bar_height: 28
        max_items: 6
        value_suffix: ""
        color: palette.secondary
        label_field: "tool"
        value_field: "count"

      - type: table-widget
        title: "Knowledge Sources"
        field: knowledge_sources             # array of {agent, platform, access}
        width_pct: 55
        columns:
          - { header: "Agent",    field: "agent",    width: 50 }
          - { header: "Platform", field: "platform", width: 28 }
          - { header: "Access",   field: "access",   width: 22, badge: true }
        max_items: 6
        badge_colors:
          "All users": palette.danger
          "Yes": palette.danger
          "Scoped": palette.success
          "No": palette.success

  # ── ROW 5: Assessment + Recommendations ────────────────────────────────────
  - id: assessment-and-recs
    height: 200
    widgets:
      - type: assessment-banner
        title: "Security Assessment"
        field: overall_assessment            # e.g. "ELEVATED — XPIA risk on 3 Published agents"
        width_pct: 40
        severity_field: "level"              # "critical" | "high" | "medium" | "low" | "informational"
        detail_field: "detail"               # 1-2 sentence supporting text
        severity_colors:
          critical: palette.danger
          high: "#FF8C00"
          medium: palette.accent
          low: palette.success
          informational: palette.primary

      - type: recommendation-cards
        title: "Recommendations"
        field: recommendations               # array of {priority, text}
        width_pct: 60
        max_items: 3
        priority_colors:
          high: palette.danger
          medium: palette.accent
          low: palette.primary
          info: palette.muted

# ─── Data Source Mapping ─────────────────────────────────────────────────────
# Maps each widget field to the report section where the data lives.
# The SVG renderer extracts these values from the completed report markdown.
data_sources:
  report_file: "reports/ai-agent-posture/AI_Agent_Posture_Report_*.md"
  field_mapping_notes: |
    # Row 1 — Title
    platform: "Report header → Platform field. Multi-platform reports → 'Multiple (N platforms)'"
    analysis_period: "Report header → Analysis Period field"
    generation_date: "Report header → Generated field"
    dcm_coverage: "Key Metrics → Deep-Manifest (DCM) Coverage % (Q14). Render as 'DCM <pct>%'"

    # Row 2 — Score + KPIs
    agent_security_score: "Agent Security Score Card → score value (0–100, HIGHER = worse). Bands: 0–20 Healthy, 21–45 Elevated, 46–70 Concerning, 71–100 Critical"
    total_agents: "Key Metrics → Total Agents (non-deleted)"
    broad_access_count: "Key Metrics → Broadly-Accessible Agents (allowForAllUsers == true)"
    xpia_risk_count: "Key Metrics → Email-Capable Agents (XPIA Risk)"
    mcp_agent_count: "Key Metrics → Agents with MCP Servers"
    privilege_broad_sensitive_count: "Capability Privilege Index section → count of broadly-accessible agents holding >=1 sensitive (write/send) operation (the 'B broad' figure). NOT summed into score — supplementary"

    # Row 3 — Dimensions + XPIA table
    score_dimensions: "Agent Security Score Card → Dimension Breakdown (5 rows, score/20). Labels MUST be: Broad Access, XPIA Email Risk, Tool & Endpoint Exposure, Data Source Risk, Credential Hygiene"
    xpia_risk_agents: "XPIA Email Exfiltration Risk table → columns: agent, platform, email_op (send-email operation name), access (Broadly Accessible: 'All users' for allowForAllUsers==true else 'Scoped'). Show the broadly-accessible (dangerous) subset first"

    # Row 4 — Tools + Knowledge
    tool_distribution: "Full Capability / Tools Inventory → top operations (operation/tool kind × agent count). May also use Capability Privilege Index distribution"
    knowledge_sources: "Declared Data Source Exposure → columns: agent, platform, access (Broadly Accessible: 'All users' for allowForAllUsers==true else 'Scoped'). AgentsInfo has no source-type/site name detail — do NOT add Type/Site columns"

    # Row 5 — Assessment + Recommendations
    overall_assessment: "Security Assessment table → overall risk rating with detail text. IMPORTANT: include the Runtime Correlation 'active-and-dangerous' finding (Q15) in the detail — name the broadly-accessible agent(s) confirmed active in CopilotActivity, or note 'no flagged agents active in window (low-coverage caveat)'"
    recommendations: "Recommendations section → top 3 action items with priority levels (🔴=high, 🟠=medium, 🟡=low). Prioritize broad+sensitive (Privilege Index) and runtime-active agents"
